name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      vscode_ref:
        description: 'VS Code ref (branch/tag/SHA) to build'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout better-vscode
        uses: actions/checkout@v4

      - name: Checkout vscode fork
        uses: actions/checkout@v4
        with:
          repository: AmaanBilwar/vscode
          ref: ${{ github.event.inputs.vscode_ref || 'main' }}
          path: vscode-src

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.1'

      - name: Build patched VS Code
        shell: bash
        run: python utils/build_release.py --vscode-dir ./vscode-src --platform "${{ matrix.platform }}" --artifact-dir ./artifacts/${{ matrix.platform }}

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
